apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: entitler-errors-dashboard

  labels:
     {{- include "bluescape-monitoring-dashboards.labels" . | nindent 4
    }}
spec:
  {{- include "bluescape-monitoring-dashboards.grafanaDashboardInstanceSelector" . | nindent 2 }}
  {{- include "bluescape-monitoring-dashboards.grafanaDashboardDatasourceMappings" (list . (list "DS_LOKI")) | nindent 2 }}
  configMapRef:
    name: entitler-errors-dashboard
    key: entitler-errors-dashboard.json
