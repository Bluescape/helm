---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-cluster-metrics-dashboard

  labels:
     {{- include "bluescape-monitoring-dashboards.labels" . | nindent 4 }}
spec:
  {{- include "bluescape-monitoring-dashboards.grafanaDashboardInstanceSelector" . | nindent 2 }}
  {{- include "bluescape-monitoring-dashboards.grafanaDashboardDatasourceMappings" (list . (list "DS_PROMETHEUS")) | nindent 2 }}
  configMapRef:
    name: k8s-cluster-metrics-dashboard
    key: k8s-cluster-metrics-dashboard.json
