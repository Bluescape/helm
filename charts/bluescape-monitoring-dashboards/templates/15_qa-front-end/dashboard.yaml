apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name:  qa-e2e-dashboard

  labels:
    {{- include "bluescape-monitoring-dashboards.labels" . | nindent 4 }}
spec:
  {{- include "bluescape-monitoring-dashboards.grafanaDashboardInstanceSelector" . | nindent 2 }}
  {{- include "bluescape-monitoring-dashboards.grafanaDashboardDatasourceMappings" (list . (list "DS_PROMETHEUS" "DS_INFLUXDB_E2E" "DS_INFLUXDB_TELEGRAF")) | nindent 2 }}
  configMapRef:
    name:  qa-e2e-dashboard
    key:  qa-e2e-dashboard.json