{{- if .Values.external_secrets.setup_github_secret }}
apiVersion: kubernetes-client.io/v1
kind: ExternalSecret
metadata:
  name: "github"
  namespace: argocd
  labels:
    {{- include "bluescape-eks-aux.labels" . | nindent 4 }}
spec:
  backendType: vault
  vaultMountPoint: kubernetes
  vaultRole: default
  data:
    - name: sshPrivateKey
      key: secret/data/token/github
      property: sshPrivateKey
{{- end }}

{{- if .Values.external_secrets_operator.setup_github_secret }}
apiVersion: 'external-secrets.io/v1beta1'
kind: 'ExternalSecret'
metadata:
  name: "github"
  namespace: argocd
  labels:
    {{- include "bluescape-eks-aux.labels" . | nindent 4 }}
spec:
  secretStoreRef:
    name: vault-backend-cs
    kind: ClusterSecretStore
  target:
    name: "github"
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: git@github.com:bluescape/infrastructure.git
  data:
  - secretKey: sshPrivateKey
    remoteRef:
      key: token/github
      property: sshPrivateKey
{{- end }}